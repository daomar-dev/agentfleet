<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; connect-src 'self' ws://localhost:* https://graph.microsoft.com https://login.microsoftonline.com https://login.live.com https://*.microsoftpersonalcontent.com https://*.sharepoint.com https://*.1drv.com https://*.files.1drv.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-src https://login.microsoftonline.com https://login.live.com" />
  <meta name="description" content="Distributed agent orchestration dashboard — submit coding tasks to all your machines simultaneously, monitor nodes, and view results. No servers, no infrastructure." />
  <meta name="theme-color" content="#0078d4" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <!-- Open Graph -->
  <meta property="og:title" content="Lattix — Distributed Agent Orchestration" />
  <meta property="og:description" content="Submit coding tasks to all your machines simultaneously. No servers, no control plane — just distributed coordination through OneDrive sync." />
  <meta property="og:image" content="https://lattix.code365.xyz/og-image.png" />
  <meta property="og:url" content="https://lattix.code365.xyz/" />
  <meta property="og:type" content="website" />
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Lattix — Distributed Agent Orchestration" />
  <meta name="twitter:description" content="Submit coding tasks to all your machines simultaneously. No servers, no control plane — just distributed coordination through OneDrive sync." />
  <meta name="twitter:image" content="https://lattix.code365.xyz/og-image.png" />
  <!-- Canonical -->
  <link rel="canonical" href="https://lattix.code365.xyz/" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/styles/main.css" />
  <title>Lattix</title>
  <!-- Structured Data: SoftwareApplication + potentialAction -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Lattix",
    "description": "Distributed agent orchestration dashboard — submit coding tasks to all your machines simultaneously, monitor nodes, and view results. Built on OneDrive sync with zero infrastructure.",
    "applicationCategory": "DeveloperApplication",
    "operatingSystem": "Windows",
    "url": "https://lattix.code365.xyz/",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "author": {
      "@type": "Person",
      "name": "Xizhang Chen",
      "url": "https://github.com/chenxizhang"
    },
    "potentialAction": [
      {
        "@type": "SearchAction",
        "target": "https://lattix.code365.xyz/#/tasks?q={search_term_string}",
        "query-input": "required name=search_term_string"
      },
      {
        "@type": "Action",
        "name": "Submit Task",
        "description": "Submit a coding task to all enrolled Lattix machines",
        "target": "https://lattix.code365.xyz/#/"
      }
    ]
  }
  </script>
</head>
<body>
  <div id="app"></div>
  <script src="/config.js"></script>
  <script type="module" src="/src/index.ts"></script>
</body>
</html>
