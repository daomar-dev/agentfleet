<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script>
    // GitHub Pages SPA redirect: route /web/* paths back to the SPA
    var path = window.location.pathname;
    if (path.startsWith('/web/') || path === '/web') {
      window.location.replace('/web/#/' + path.slice(5));
    } else {
      window.location.replace('/');
    }
  </script>
</head>
<body></body>
</html>
